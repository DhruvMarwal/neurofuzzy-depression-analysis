name: Deploy to Azure

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Login to ACR
      run: az acr login --name neuroregistry123

    - name: Build Docker image
      run: docker build -t neuroregistry123.azurecr.io/neurofuzzy-app:latest .

    - name: Push Docker image
      run: docker push neuroregistry123.azurecr.io/neurofuzzy-app:latest

    - name: Restart Web App
      run: az webapp restart --name neurofuzzy-depression --resource-group neuro-rg

      